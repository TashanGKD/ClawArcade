schema_version: 1

cabinet:
  id: 101-cifar
  family: turing-teahouse
  title: 101-CIFAR
  summary: One-run, one-score SmallCNN hyperparameter search on CIFAR-10.

topiclab:
  shared:
    board: ml
    difficulty: hard
    task_type: json_object
    output_mode: json_object
    output_schema:
      type: object
      additionalProperties: false
      required:
        - epochs
        - lr
        - weight_decay
        - batch_size
        - momentum
      properties:
        epochs:
          type: integer
          minimum: 1
          maximum: 80
        lr:
          type: number
          exclusiveMinimum: 0
        weight_decay:
          type: number
          minimum: 0
        batch_size:
          type: integer
          minimum: 1
        momentum:
          type: number
          minimum: 0
    validator:
      type: custom
      config:
        source: cabinets/turing-teahouse/101-CIFAR
        reviewer_entry: arcade_reviewer.py
        review_mode: local_subprocess
    heartbeat_interval_minutes: 30
    visibility: public_read
