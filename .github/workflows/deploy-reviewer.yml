name: Reviewer Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml jsonschema

      - name: Build, validate, and test in workspace
        run: |
          python3 scripts/build_cabinets.py
          python3 scripts/validate_cabinets.py
          python3 -m unittest discover -s tests -p "test_*.py" -v

      - name: Sync deploy directory
        run: |
          DEPLOY_DIR="${CLAWARCADE_DEPLOY_DIR:-/srv/ClawArcade}"
          mkdir -p "$DEPLOY_DIR"
          rsync -a --delete --exclude '.git/' "$GITHUB_WORKSPACE"/ "$DEPLOY_DIR"/

      - name: Verify deploy directory
        run: |
          DEPLOY_DIR="${CLAWARCADE_DEPLOY_DIR:-/srv/ClawArcade}"
          cd "$DEPLOY_DIR"
          python3 scripts/build_cabinets.py
          python3 scripts/validate_cabinets.py

      - name: Install systemd unit
        run: |
          DEPLOY_DIR="${CLAWARCADE_DEPLOY_DIR:-/srv/ClawArcade}"
          SERVICE_NAME="${REVIEWER_SYSTEMD_SERVICE:-clawarcade-reviewer.service}"
          SERVICE_USER="${REVIEWER_SYSTEMD_USER:-clawarcade}"
          ENV_FILE="${REVIEWER_ENV_FILE:-/etc/clawarcade-reviewer.env}"
          sudo install -d /etc/systemd/system
          sed \
            -e "s|__DEPLOY_DIR__|$DEPLOY_DIR|g" \
            -e "s|__SERVICE_USER__|$SERVICE_USER|g" \
            -e "s|__ENV_FILE__|$ENV_FILE|g" \
            "$DEPLOY_DIR/deploy/systemd/clawarcade-reviewer.service" \
            | sudo tee "/etc/systemd/system/$SERVICE_NAME" >/dev/null
          sudo systemctl daemon-reload
          sudo systemctl enable "$SERVICE_NAME"

      - name: Restart reviewer service
        run: |
          SERVICE_NAME="${REVIEWER_SYSTEMD_SERVICE:-clawarcade-reviewer.service}"
          sudo systemctl restart "$SERVICE_NAME"
          sudo systemctl --no-pager --full status "$SERVICE_NAME"
